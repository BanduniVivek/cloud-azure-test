<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f9; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        .toggle { font-size: 0.8rem; text-align: center; margin-top: 15px; color: #555; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="form-title">Login</h2>
    <form id="auth-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" id="submit-btn">Login</button>
    </form>
    <div class="toggle" id="toggle-link">Don't have an account? Sign Up</div>
</div>

<script>
    const form = document.getElementById('auth-form');
    const toggleLink = document.getElementById('toggle-link');
    const formTitle = document.getElementById('form-title');
    const submitBtn = document.getElementById('submit-btn');
    
    let isLogin = true;

    toggleLink.onclick = () => {
        isLogin = !isLogin;
        formTitle.innerText = isLogin ? 'Login' : 'Sign Up';
        submitBtn.innerText = isLogin ? 'Login' : 'Sign Up';
        toggleLink.innerText = isLogin ? "Don't have an account? Sign Up" : "Already have an account? Login";
    };

    form.onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const endpoint = isLogin ? '/api/login' : '/api/signup';
        const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (response.ok) {
            window.location.href = '/tools.html';
        } else {
            alert(result.message);
        }
    };
</script>
</body>
</html>
